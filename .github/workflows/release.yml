name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  cleanup:
    name: Clean up stale draft release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing draft release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Checking for existing release: $TAG"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Deleting existing release: $TAG"
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag=false
          else
            echo "No existing release found for $TAG"
          fi

  release:
    name: Build & Release on ${{ matrix.os }}
    needs: [cleanup]
    if: always() && (needs.cleanup.result == 'success' || needs.cleanup.result == 'skipped')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./desktop
        run: npm install

      - name: Build & Publish Release
        working-directory: ./desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx vite build
          if [ "${{ github.ref_type }}" == "tag" ]; then
            npx electron-builder --publish always
          else
            npx electron-builder --publish never
          fi
        shell: bash

      - name: Upload Artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ matrix.os }}
          path: |
            desktop/release/**/*.exe
            desktop/release/**/*.dmg
            desktop/release/**/*.deb
            desktop/release/**/*.AppImage

  publish-release:
    name: Publish GitHub Release
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Publishing release for tag: $TAG"
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
